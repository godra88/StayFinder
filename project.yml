name: StayFinder

options:
  bundleIdPrefix: com.surglogs.hiring
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.5.1"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"

targets:
  StayFinder:
    type: application
    platform: iOS
    sources:
      - path: StayFinder/Sources
        excludes:
          - Extensions/.gitkeep
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher
        product: Kingfisher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surglogs.hiring.StayFinder
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CODE_SIGN_IDENTITY: "iPhone Developer"
        LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/Frameworks"]
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  StayFinderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StayFinder/Tests
    dependencies:
      - target: StayFinder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surglogs.hiring.StayFinderTests
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StayFinder.app/StayFinder"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
